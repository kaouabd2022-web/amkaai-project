<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amkaai AI</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/favicon.png">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 Navbar -->
<header class="navbar">
  <div class="logo">AMKAAI</div>

  <nav>
    <a data-key="home">Home</a>
    <a data-key="features">Features</a>
    <a data-key="pricing">Pricing</a>
  </nav>

  <div class="actions">
    <button class="login" data-key="login">Sign In</button>
    <button class="signup" data-key="signup">Get Started</button>

    <!-- 🌍 Language -->
    <select id="language">
      <option value="en">🇬🇧 EN</option>
      <option value="fr">🇫🇷 FR</option>
      <option value="ar">🇸🇦 AR</option>
      <option value="zh">🇨🇳 CN</option>
      <option value="es">🇪🇸 ES</option>
      <option value="it">🇮🇹 IT</option>
      <option value="de">🇩🇪 DE</option>
    </select>
  </div>
</header>

<!-- 🎯 Hero -->
<section class="hero">
  <img src="images/logo.png" class="hero-logo">

  <h1 data-key="title">Create AI Videos in Seconds</h1>
  <p data-key="subtitle">Transform your ideas into stunning AI videos instantly</p>

  <button class="cta" data-key="cta">Start Free</button>
</section>

<!-- ⭐ Features -->
<section class="features">
  <div class="card">
    <h3 data-key="f1_title">AI Avatars</h3>
    <p data-key="f1_desc">Create realistic avatars with AI</p>
  </div>

  <div class="card">
    <h3 data-key="f2_title">Text to Video</h3>
    <p data-key="f2_desc">Turn text into powerful videos</p>
  </div>

  <div class="card">
    <h3 data-key="f3_title">Voice AI</h3>
    <p data-key="f3_desc">Generate realistic voices</p>
  </div>
</section>

<script src="script.js"></script>

</body>
</html>
